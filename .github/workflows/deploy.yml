name: Build & Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ziadmo
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            --build-arg HF_TOKEN=${{ secrets.HF_TOKEN }} \
            --build-arg HF_REPO_ID=${{ secrets.HF_REPO_ID }} \
            -t ziadmo/med-report-api:latest \
            -t ziadmo/med-report-api:${{ github.sha }} \
            .

      # 4. Push to Docker Hub
      - name: Push to Docker Hub
        run: |
          docker push ziadmo/med-report-api:latest
          docker push ziadmo/med-report-api:${{ github.sha }}