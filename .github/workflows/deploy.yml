  name: Build & Deploy to AWS ECS

  on:
    push:
      branches:
        - main

  env:
    AWS_REGION: us-east-1
    ECS_CLUSTER: med-report-cluster
    ECS_SERVICE: med-report-service
    CONTAINER_NAME: Main
    TASK_DEFINITION_FAMILY: med-report-cluster-med-report-service
    DOCKERHUB_USERNAME: ziadmo
    IMAGE_NAME: ziadmo/med-report-api
    CACHE_IMAGE: ziadmo/med-report-api:buildcache

  jobs:
    build-and-deploy:
      runs-on: ubuntu-latest

      permissions:
        id-token: write
        contents: read

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ env.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Build and push image
          uses: docker/build-push-action@v5
          with:
            context: .
            push: true
            tags: |
              ${{ env.IMAGE_NAME }}:latest
              ${{ env.IMAGE_NAME }}:${{ github.sha }}
            build-args: |
              HF_TOKEN=${{ secrets.HF_TOKEN }}
              HF_REPO_ID=${{ secrets.HF_REPO_ID }}
            cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}
            cache-to: type=registry,ref=${{ env.CACHE_IMAGE }},mode=max

